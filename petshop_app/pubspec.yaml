name: petshop_app
description: "PetShop Manager - Sistema de Inventario para Tiendas de Mascotas"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  fl_chart: ^0.69.2
  intl: ^0.20.2
  google_fonts: ^6.2.1
  http: ^1.2.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/img/logos/Logo_B.png

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/img/logos/Logo_B.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/img/logos/Logo_B.png"
  remove_alpha_ios: true
  min_sdk_android: 21
